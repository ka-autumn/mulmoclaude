name: E2E Live (triage matrix)

# Runs every e2e-live spec file in its own job so we can triage which
# scenarios work end-to-end in CI and which need extra wiring (Claude
# auth, secrets, etc.). `fail-fast: false` keeps the matrix going so
# one broken spec doesn't hide the rest.
#
# Sandbox is disabled because CI runners don't have a logged-in
# `claude` CLI; without DISABLE_SANDBOX=1 the server hits
# `assertClaudeFiles()` and exits before Vite proxies anything.

on:
  schedule:
    - cron: "0 0 * * 1"  # Weekly Monday 00:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/e2e_live_no_llm.yaml"

permissions:
  contents: read

concurrency:
  group: e2e-live-triage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-live:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        spec:
          - wiki              # expected ✓ — no LLM, workspace-seed only
          - wiki-nav          # expected ✓ — no LLM, workspace-seed only
          - workspace-link-routing  # mixed — L-24 ✓, L-23 needs LLM
          - media             # needs Claude
          - mulmo-script-edit # needs Claude
          - roles             # needs Claude
          - session           # needs Claude
          - skills            # needs Claude
          - ui                # needs Claude

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 120000

      - name: Build internal packages (required by yarn dev)
        run: yarn build:packages

      - name: Install Playwright (chromium only)
        run: npx playwright install chromium --with-deps

      - name: Create workspace dir
        run: mkdir -p "$HOME/mulmoclaude"

      - name: Start mulmoclaude dev server (background)
        env:
          # Skip Docker sandbox setup. Without this the server calls
          # `assertClaudeFiles()` (server/system/docker.ts) which
          # requires ~/.claude + ~/.claude.json to exist and exits 1
          # otherwise — concurrently then kills Vite via -k.
          DISABLE_SANDBOX: "1"
        run: |
          yarn dev > dev-server.log 2>&1 &
          echo $! > dev-server.pid
          echo "Started yarn dev with PID $(cat dev-server.pid)"

      - name: Wait for Vite (5173) to be ready
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:5173 > /dev/null 2>&1; then
              echo "Vite ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Vite did not come up in 180s — dumping tail of dev-server.log"
          tail -200 dev-server.log
          exit 1

      - name: Run ${{ matrix.spec }}.spec.ts
        run: |
          npx playwright test \
            --config e2e-live/playwright.config.ts \
            ${{ matrix.spec }}.spec.ts
        env:
          E2E_LIVE_BASE_URL: http://localhost:5173
          E2E_LIVE_WORKERS: "2"
          E2E_LIVE_REPORT_SUBDIR: ${{ matrix.spec }}

      - name: Stop dev server
        if: always()
        run: |
          if [ -f dev-server.pid ]; then
            kill "$(cat dev-server.pid)" 2>/dev/null || true
            sleep 2
            kill -9 "$(cat dev-server.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.spec }}
          path: playwright-report-live/${{ matrix.spec }}/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload dev server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-log-${{ matrix.spec }}
          path: dev-server.log
          retention-days: 7
          if-no-files-found: ignore
